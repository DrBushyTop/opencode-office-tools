name: Release Installers

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  build-mac:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build macOS installer
        run: TARGET_ARCH=${{ matrix.arch }} bun run build:installer:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-installer-${{ matrix.arch }}
          path: build/macos/*.pkg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build Windows installer
        run: bun run build:installer:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: build/electron/*.exe
          if-no-files-found: error

  create-release:
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create source zip (excluding private files)
        run: |
          mkdir -p artifacts
          zip -r artifacts/opencode-office-addin-source-v${{ github.event.inputs.version }}.zip . \
            -x ".github/*" \
            -x "bun.lock" \
            -x "node_modules/*" \
            -x "build/*" \
            -x "dist/*" \
            -x ".git/*" \
            -x ".DS_Store" \
            -x "*.zip"
          
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          pattern: macos-installer-*
          merge-multiple: true
          path: artifacts

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Release v${{ github.event.inputs.version }}
          body: |
            ## OpenCode Office Add-in v${{ github.event.inputs.version }}
            
            Download the installer for your platform, then:
            
            ### Quick Start
            1. Install the platform package:
               - **macOS:** run the `.pkg`
               - **Windows:** run the `.exe`
            2. Launch the installed app if it does not open automatically.
            3. Open Word, PowerPoint, or Excel → **Insert** → **Add-ins** → **My Add-ins** → **OpenCode**
            
            See `GETTING_STARTED.md` for detailed instructions.
            
            ### Source Code
            The source zip excludes CI workflows and lock files. Run `bun install` to install dependencies.
          files: artifacts/*.zip
          draft: false
          prerelease: false
